# Fly.io config — your own Deutsche Bahn db-rest instance for the EU Rail tab.
#
# Deploy:
#   fly launch --image docker.io/derhuerst/db-rest:6 --copy-config --now \
#     --name eurail-db-rest --region fra
#   # or, with this file:  fly deploy -c eurail-server/fly.toml
#
# You get https://<app>.fly.dev — paste it into Settings ⚙ → EU rail data URL.
app = "eurail-db-rest"
primary_region = "fra"

[build]
  image = "docker.io/derhuerst/db-rest:6"

[env]
  PORT = "3000"
  HOSTNAME = "eurail-db-rest.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
