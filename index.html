<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>b2see — Paperboy</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="game" width="800" height="600"></canvas>
    <button id="mute-btn" title="Mute (M)">🔊</button>

    <div id="overlay" class="overlay">
      <div class="panel">
        <h1>B2SEE</h1>
        <p class="subtitle">A modern take on the 1984 classic <em>Paperboy</em></p>
        <ul class="controls">
          <li><b>&larr; &rarr;</b> &nbsp;steer &nbsp;&nbsp; <b>&uarr; &darr;</b> &nbsp;pedal / brake</li>
          <li><b>Z</b> throw left &nbsp;&nbsp; <b>X</b> throw right</li>
          <li>Deliver to <span class="good">subscriber</span> houses, dodge dogs,
            traffic &amp; the Reaper, then ride the <span class="good">BMX</span> bonus course.</li>
        </ul>
        <button id="start-btn">Start Route</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
