name = "edi-departures-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Credentials are SECRETS, not vars. Set them after first deploy:
#   wrangler secret put RAPIDAPI_KEY          # flights (AeroDataBox)
#   wrangler secret put TRANSPORTAPI_APP_ID   # buses (TransportAPI)
#   wrangler secret put TRANSPORTAPI_APP_KEY  # buses (TransportAPI)
#
# Each is optional — set only the ones for the feeds you want live.
#
# Optionally lock CORS to your site instead of allowing any origin ("*").
# Uncomment and set to your Pages origin (no trailing slash):
# [vars]
# ALLOWED_ORIGIN = "https://agamenondundee.github.io"
