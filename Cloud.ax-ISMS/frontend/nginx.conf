server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API, authentication and health are proxied to the backend service so the browser
  # makes same origin requests and the session cookie is sent normally. Terminate TLS
  # in front of this server in production.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /auth/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /health {
    proxy_pass http://backend:4000;
  }

  location / {
    try_files $uri /index.html;
  }
}
